services:
  ride-share-im:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: ride-share-im
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  postgres:
    image: postgres:16
    container_name: ride-share-postgres
    environment:
      POSTGRES_USER: rideshare_user
      POSTGRES_PASSWORD: rideshare_pass
      POSTGRES_DB: ride-share
    ports:
      - "5432:5432"
    volumes:
      - ride_share_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideshare_user -d ride-share"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ride-share-api
    depends_on:
      ride-share-im:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ride-share
      SPRING_DATASOURCE_USERNAME: rideshare_user
      SPRING_DATASOURCE_PASSWORD: rideshare_pass
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/ride-share
      KEYCLOAK_JWK_SET_URI: http://ride-share-im:8080/realms/ride-share/protocol/openid-connect/certs
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  ride_share_postgres_data:
