spring:
  application:
    name: ride-share-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ride-share}
    username: ${SPRING_DATASOURCE_USERNAME:rideshare_user}
    password: ${SPRING_DATASOURCE_PASSWORD:rideshare_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/ride-share}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/ride-share/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8080}
